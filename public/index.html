<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0D3B6E" />
    <meta name="robots" content="index, follow" />

    <title>Ovivo WorkHub &ndash; Operations Management</title>
    <meta name="description" content="Ovivo WorkHub ist eine moderne digitale Arbeitsplattform fuer Projekte, Auftraege, Teams, Materialverwaltung und Partner-Kommunikation." />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" href="/ovivo-logo.svg" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.ovivo.io/" />
    <meta property="og:title" content="Ovivo WorkHub &ndash; Operations Management" />
    <meta property="og:description" content="Projekte, Auftraege, Teams und Materialien in einer klaren digitalen Arbeitsplattform. Entwickelt und betreut von Ovivo." />
    <meta property="og:image" content="https://app.ovivo.io/og-workhub.png" />
    <meta property="og:image:secure_url" content="https://app.ovivo.io/og-workhub.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ovivo WorkHub Dashboard Vorschau" />
    <meta property="og:site_name" content="Ovivo WorkHub" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ovivo WorkHub &ndash; Operations Management" />
    <meta name="twitter:description" content="Projekte, Auftraege, Teams und Materialien in einer klaren digitalen Arbeitsplattform." />
    <meta name="twitter:image" content="https://app.ovivo.io/og-workhub.png" />

    <style>
      html, body { overscroll-behavior-y: none; }
      input, textarea, select { font-size: 16px !important; }
      textarea { overscroll-behavior: contain; scroll-margin-bottom: 160px; }

      img[src*="base64"], img[src*="ovivo-logo"] {
        content: url('/ovivo-logo.svg') !important;
        object-fit: contain !important;
        background: transparent !important;
        border-radius: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
      }

      div:has(> img[src*="base64"]),
      div:has(> img[src*="ovivo-logo"]) {
        background: transparent !important;
        background-color: transparent !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
      }

      header div:has(+ div),
      nav div:has(+ div),
      aside div:has(+ div) {
        box-shadow: none !important;
      }
    </style>

    <script>
      window.OVIVO_LOGO_SRC = "/ovivo-logo.svg";
      (function() {
        function cleanTracking() {
          if (location.search && location.search.indexOf('utm_source') !== -1) {
            history.replaceState(null, document.title, location.pathname + location.hash);
          }
        }
        function patchLogo() {
          var imgs = Array.prototype.slice.call(document.querySelectorAll('img'));
          imgs.forEach(function(img) {
            var r = img.getBoundingClientRect();
            var isSmallLogo = (r.width <= 100 && r.height <= 100) || /logo/i.test(img.alt || '') || /logo/i.test(img.className || '') || (img.src && img.src.indexOf('base64') !== -1);
            if (isSmallLogo && img.src.indexOf('/ovivo-logo.svg') === -1) {
              img.src = window.OVIVO_LOGO_SRC;
              img.style.background = 'transparent';
              img.style.borderRadius = '0';
              img.style.objectFit = 'contain';
              img.style.padding = '0';
              if (img.parentElement) {
                img.parentElement.style.background = 'transparent';
                img.parentElement.style.backgroundColor = 'transparent';
                img.parentElement.style.borderRadius = '0';
                img.parentElement.style.boxShadow = 'none';
                img.parentElement.style.padding = '0';
              }
            }
          });
        }
        function stopCommentScrollJump() {
          document.addEventListener('input', function(e) {
            if (e.target && e.target.tagName === 'TEXTAREA') {
              var y = window.scrollY;
              requestAnimationFrame(function() {
                if (Math.abs(window.scrollY - y) > 20) window.scrollTo(0, y);
              });
            }
          }, true);
        }
        document.addEventListener('DOMContentLoaded', function() {
          cleanTracking();
          stopCommentScrollJump();
          patchLogo();
          setInterval(patchLogo, 700);
        });
      })();
    </script>
  </head>
  <body>
    <noscript>Bitte JavaScript aktivieren, um WorkHub zu nutzen.</noscript>
    <div id="root"></div>
  </body>
</html>
